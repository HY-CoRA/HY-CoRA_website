<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1024" />
  <title>HY-CoRA Admin - 모집안내</title>
  <link rel="stylesheet" href="../style.css" />
</head>
<body class="admin-page" data-admin-page="apply-links">
  <main class="admin-shell">
    <header class="admin-header">
      <h1>모집안내</h1>
      <nav><a href="index.html">관리 홈</a><a href="../apply.html">페이지 보기</a></nav>
    </header>
    <form id="apply-form" class="admin-panel admin-form">
      <h2>모집 일정</h2>
      <label>모집 연도<input name="year" type="number" /></label>
      <div class="admin-row">
        <label>1학기 정규 모집 시작<input name="s1Start" type="date" /></label>
        <label>1학기 정규 모집 종료<input name="s1End" type="date" /></label>
      </div>
      <div class="admin-row">
        <label>2학기 정규 모집 시작<input name="s2Start" type="date" /></label>
        <label>2학기 정규 모집 종료<input name="s2End" type="date" /></label>
      </div>
      <h2>지원 링크</h2>
      <label>신규 지원 링크<input name="newUrl" /></label>
      <label>신규 지원 버튼 문구<input name="newLabel" /></label>
      <label>재가입 링크<input name="returningUrl" /></label>
      <label>재가입 버튼 문구<input name="returningLabel" /></label>
      <button type="submit">저장</button>
    </form>
  </main>
  <script src="../js/site-data.js"></script>
  <script src="admin.js"></script>
</body>
</html>
