<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1024" />
  <title>HY-CoRA Admin - 사이트 콘텐츠</title>
  <link rel="stylesheet" href="../style.css" />
</head>
<body class="admin-page" data-admin-page="site-content">
  <main class="admin-shell">
    <header class="admin-header">
      <h1>사이트 콘텐츠</h1>
      <nav><a href="index.html">관리 홈</a><a href="../index.html">사이트 보기</a></nav>
    </header>

    <section class="admin-panel">
      <h2>배너 이미지</h2>
      <form id="banner-form" class="admin-form">
        <label>API Base URL<input name="apiBase" placeholder="https://api.hycora.com" /></label>
        <label>메인 배너 URL<input name="mainImageUrl" /></label>
        <label>메인 배너 Alt<input name="mainAltText" /></label>
        <label>소개 배너 URL<input name="aboutImageUrl" /></label>
        <label>소개 배너 Alt<input name="aboutAltText" /></label>
        <button type="submit">저장</button>
      </form>
    </section>

    <section class="admin-panel">
      <h2>Past Events</h2>
      <div id="past-events-editor" class="admin-stack"></div>
      <button type="button" id="add-past-event">이벤트 추가</button>
      <button type="button" id="save-past-events">저장</button>
    </section>

    <section class="admin-panel">
      <h2>임원진 사진 관리</h2>
      <div id="leader-photos-grid" class="admin-leader-grid"></div>
    </section>

    <section class="admin-panel">
      <h2>비밀번호 변경</h2>
      <form id="change-password-form" class="admin-form">
        <label>현재 비밀번호<input type="password" name="currentPassword" autocomplete="current-password" /></label>
        <label>새 비밀번호<input type="password" name="newPassword" autocomplete="new-password" /></label>
        <label>새 비밀번호 확인<input type="password" name="confirmPassword" autocomplete="new-password" /></label>
        <div id="change-password-msg" hidden></div>
        <button type="submit">변경</button>
      </form>
    </section>
  </main>
  <script src="../js/site-data.js"></script>
  <script src="auth.js"></script>
  <script src="admin.js"></script>
</body>
</html>
